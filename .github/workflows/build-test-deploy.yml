name: build-test-deploy

on: push

jobs:
  build: 
    runs-on:  ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build
  
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - name: Run tests (timed)
        id: timed_tests
        shell: bash
        run: |
          start=$(date +%s)
          npm test
          test_exit=$?

          end=$(date +%s)
          duration=$((end - start))

          echo "### Test step duration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`npm test\` took **${duration}s**" >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Step duration::npm test took ${duration}s"

          exit $test_exit

  deploy:
    needs: test

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
      - name: use node.js
        uses:  actions/setup-node@v4
        with:  
          node-version: '20.x'
      - name: configure github pages
        uses:  actions/configure-pages@v4
        with:
          static_site_generator:  next
      - run: npm install
      - run: npm run build
      - name: upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
        
